title: Whoosh-ng Documentation
description: Pure-Python full-text indexing and search library, modernized for 2025+
remote_theme: just-the-docs/just-the-docs
url: "https://dorel14.github.io"
baseurl: "/whoosh-ng"

collections:
  en:
    output: true
    sort_by: nav_order
  fr:
    output: true
    sort_by: nav_order

defaults:
  - scope:
      path: ""
      type: en
    values:
      layout: default
      lang: en
  - scope:
      path: ""
      type: fr
    values:
      layout: default
      lang: fr

include:
  - favicon.ico
  - logo.png

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
