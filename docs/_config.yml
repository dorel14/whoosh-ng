title: Whoosh-ng Documentation
description: Pure-Python full-text indexing and search library, modernized for 2025+
lang: en
timezone: UTC

# GitHub Pages: base URL for project pages
baseurl: "/whoosh-ng"
# url: "https://dorel14.github.io/whoosh-ng"  # Uncomment for absolute URLs in assets

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Use remote theme for Just the Docs (GitHub Pages compatible)
remote_theme: just-the-docs/just-the-docs

# Just the Docs theme configuration
just_the_docs:
  search_enabled: true
  search_preview: true
  heading_break: 360
  nav_sort: case_insensitive
  nav_fold: true
  footer_content: "Whoosh-NG Documentation | Last updated: 2026-07-12"

# Collections for organized content
collections:
  en:
    output: true
    sort_by: nav_order
  fr:
    output: true
    sort_by: nav_order

# Default front matter for markdown files
defaults:
  # Root pages (README.md, etc.)
  - scope:
      path: ""
      type: pages
    values:
      layout: default
  # Collection: English
  - scope:
      path: "en"
      type: en
    values:
      layout: default
      lang: en
  # Collection: French
  - scope:
      path: "fr"
      type: fr
    values:
      layout: default
      lang: fr

# Include additional files
include:
  - favicon.ico
  - logo.png
  - README.md

# Exclude from build
exclude:
  - archive/
  - .kilo/
  - .git/
  - node_modules/
  - vendor/
  - "*.py"
  - "*.json"
  - "*.yaml"
  - "*.yml"
  - ".env*"
  - "*.log"
  - "__pycache__/"
  - "*.egg-info/"
  - ".venv/"
  - "venv/"
  - Gemfile
  - Gemfile.lock

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# SEO and social
github_username: dorel14
repository: whoosh-ng