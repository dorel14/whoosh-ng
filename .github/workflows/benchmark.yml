name: Performance Benchmark

on:
  push:
    branches: [ master, dev ]

permissions:
  contents: write # Required for the action to push results to gh-pages

jobs:
  benchmark:
    name: Run Python Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create gh-pages branch if missing
        if: success()
        run: |
          if ! git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git checkout -b gh-pages
            git push -u origin gh-pages
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up UV
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --extra dev --extra vector
          uv pip install pytest-benchmark psutil

      - name: Run benchmarks
        run: |
          # The benchmark fixture comes from pytest-benchmark (installed above).
          # whoosh-ng keeps its benchmarks in tests/benchmark_async.py.
          # Use a warmup round and a longer minimum time to reduce noise on CI.
          uv run pytest --benchmark-json output.json --benchmark-warmup=on --benchmark-min-time=0.5 tests/benchmark_async.py

      - name: Store and compare benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          fail-on-alert: false
          alert-threshold: '200%'
          comment-on-alert: true
