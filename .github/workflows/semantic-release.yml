---
name: Semantic Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up UV
        uses: astral-sh/setup-uv@v5

      - name: Install semantic-release
        run: uv pip install --system python-semantic-release

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine release version
        id: version
        run: |
          VERSION="$(python -m semantic_release version --print)"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Detected version: ${VERSION}"
          else
            echo "No release required: ${VERSION}"
          fi

      - name: Update docs version
        if: steps.version.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Mise à jour de docs/_config.yml (clé 'version:')
          if [ -f docs/_config.yml ]; then
            sed -i -E "s/^(v|V)ersion: .*/version: $VERSION/" docs/_config.yml
          fi
          # Mise à jour de l'installation pip (whoosh-ng=={VERSION})
          find docs/ -name "*.md" -exec sed -i -E \
            "s/whoosh-ng==(\{[Vv]ersion\}|[0-9.]+)/whoosh-ng==$VERSION/g" {} \;
          sed -i -E "s/whoosh-ng==(\{[Vv]ersion\}|[0-9.]+)/whoosh-ng==$VERSION/g" README.md

      - name: Create release and tag
        if: steps.version.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python -m semantic_release version --vcs-release

      - name: Build distributions
        if: steps.version.outputs.version != ''
        run: uv build

      - name: Publish to PyPI
        if: steps.version.outputs.version != ''
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish --token "$PYPI_TOKEN"
